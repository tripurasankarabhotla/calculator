<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style2.css">
    <script defer src="script2.js"></script>
</head>
<body>
        <div class="container">
        <div class="screen">0</div>
        <div class="buttons">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>+</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>-</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>*</button>
            <button>0</button>
            <button>00</button>
            <button>.</button>
            <button>/</button>
            <div class="last">
                <button disabled></button>
                <button>C</button>
                <button class="equal">=</button>
            </div>
        </div>
    </div>
</body>
</html>
