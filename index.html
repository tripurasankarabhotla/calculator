<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">
    <script defer src="calculator.js"></script>
</head>

<body>
    <div class="container">
        <div class="screen">0</div>
        <div class="button-container">
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="op">+</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button class="op">-</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button class="op">*</button>
            <button>0</button>
            <button>00</button>
            <button>.</button>
            <button class="op">/</button>
            <button class="equal">=</button>
            <button class="clear">C</button> </div>
</body>

</html>
